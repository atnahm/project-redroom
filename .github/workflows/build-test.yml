name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r redroom/requirements.txt

    - name: Run integration tests
      run: |
        cd redroom
        python -m pytest test_integration.py -v --tb=short || true

    - name: Lint Python files
      run: |
        pip install flake8
        flake8 redroom --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Check Docker build
      run: |
        docker build -t redroom:test .

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/redroom:latest
          ${{ secrets.DOCKER_USERNAME }}/redroom:${{ github.sha }}
