name: Redroom Production Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  # Update this if your Docker Hub username is different
  DOCKER_IMAGE: atnaham/redroom

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
        cache: 'pip' # Speeds up installation

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r redroom/requirements.txt
        pip install flake8 pytest

    - name: Lint Python files
      # Removed || true. If the code is messy, the build fails.
      run: flake8 redroom --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run integration tests
      # Removed || true. If tests fail, the pipeline stops here.
      run: |
        cd redroom
        python -m pytest test_integration.py -v --tb=short

  build-and-publish:
    needs: test-and-lint
    # Only publish if we are merging/pushing to main, or creating a tag
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.DOCKER_IMAGE }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=sha,format=long

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        # Matches the secrets we discussed earlier
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

  deploy:
    needs: build-and-publish
    # Only deploy on official version tags (e.g., v1.0.0)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to Kubernetes
      env:
        KUBECONFIG: ${{ secrets.KUBE_CONFIG }}
      run: |
        # Use the specific SHA or Tag that was just built, not 'latest'
        kubectl set image deployment/redroom-api \
          redroom-api=${{ env.DOCKER_IMAGE }}:${{ github.ref_name }} \
          -n redroom
